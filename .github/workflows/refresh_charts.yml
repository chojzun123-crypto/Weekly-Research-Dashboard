name: 차트 자동 새로고침
on:
  schedule:
    - cron: '17 0 * * 1-5'  # 평일 09:17 KST
    - cron: '23 1 * * 1-5'  # 평일 10:23 KST
    - cron: '17 4 * * 1-5'  # 평일 13:17 KST
    - cron: '23 5 * * 1-5'  # 평일 14:23 KST
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3
      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 대시보드 재생성 (스크랩 없이 차트만 갱신)
        run: python generate_dashboard.py --no-open
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
      - name: 결과 저장 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard.html dashboard_data.json
          git diff --staged --quiet && echo "변경 없음" || git commit -m "차트 새로고침: $(date '+%Y-%m-%d %H:%M' -u -d '+9 hours')"
          # 생성 산출물(dashboard.html / dashboard_data.json)은 매번 재생성되므로
          # 충돌 시 방금 만든 봇 버전(theirs)을 채택
          git pull --rebase -X theirs origin main || (
            git checkout --theirs dashboard.html dashboard_data.json 2>/dev/null || true
            git add dashboard.html dashboard_data.json
            GIT_EDITOR=true git rebase --continue || git rebase --abort
          )
          git push || echo "푸시할 변경사항 없음"
