name: 주간 리포트 스크랩
on:
  schedule:
    - cron: '43 6 * * 5'  # 매주 금요일 오후 3시 43분 KST
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작일 (YYYYMMDD, 비우면 이번 주 자동)'
        required: false
        default: ''
      end_date:
        description: '종료일 (YYYYMMDD, 비우면 이번 주 자동)'
        required: false
        default: ''
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3
      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: Playwright 설치          # ← 추가
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: 리포트 스크랩 & 대시보드 생성
        run: |
          ARGS="--scrape --no-open"
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --start ${{ github.event.inputs.start_date }} --end ${{ github.event.inputs.end_date }}"
            echo "기간 지정: ${{ github.event.inputs.start_date }} ~ ${{ github.event.inputs.end_date }}"
          else
            echo "기간 미지정 → 이번 주 자동"
          fi
          python generate_dashboard.py $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: 결과 저장 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard.html dashboard_data.json   # ← dashboard_data.json 추가
          git add -A output_top5/ output_industry/ 2>/dev/null || true
          git commit -m "주간 리포트 업데이트: $(date '+%Y-%m-%d')" || echo "변경 없음"
          git pull --rebase origin main
          git push
